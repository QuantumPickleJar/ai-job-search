name: ai-job-search

services:
  ai-job-service:
    image: ai-job-service:local
    build:
      context: .
      dockerfile: service/Dockerfile
    restart: unless-stopped
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "${APP_PORT:-3927}"
      APP_DATA_DIR: "/app/data"
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-3927}:${APP_PORT:-3927}"
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os, urllib.request;
          port = os.environ.get("APP_PORT", "3927");
          urllib.request.urlopen(f"http://127.0.0.1:{port}/health", timeout=3)
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
