services:
  ai-job-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-job-service
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3927}:3927"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "3927"
      APP_DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3927/health"]
      interval: 30s
      timeout: 10s
      retries: 3
